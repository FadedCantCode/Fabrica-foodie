<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>元氣騎士 · Soul Knight</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ios:cubic-bezier(0.22,1,0.36,1);
  --amber:#E8821A;
  --glass:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.14);
  --txt:#F5F5F7;
  --txt-dim:rgba(245,245,247,0.55);
}
html,body{height:100%;background:#000;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;user-select:none;color:var(--txt)}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0f}
canvas#g{image-rendering:pixelated;display:block;background:#101018}

/* ── Glass panel ── */
.glass{background:rgba(20,20,28,0.72);backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  border:0.5px solid var(--glass-border);border-radius:20px;
  box-shadow:0 16px 48px rgba(0,0,0,0.5),inset 0 0.5px 0 rgba(255,255,255,0.12)}

/* ── HUD ── */
#hud{position:fixed;top:max(14px,env(safe-area-inset-top));left:14px;z-index:20;
  display:flex;flex-direction:column;gap:8px;pointer-events:none}
.hud-card{padding:10px 14px;display:flex;flex-direction:column;gap:7px;min-width:174px}
.stat-row{display:flex;align-items:center;gap:8px}
.stat-icon{width:14px;font-size:11px;text-align:center;flex-shrink:0}
.pips{display:flex;gap:3.5px;flex-wrap:wrap;max-width:130px}
.pip{width:11px;height:11px;border-radius:3.5px;transition:all 0.35s var(--ios)}
.pip.hp-on{background:linear-gradient(135deg,#FF453A,#FF6961);box-shadow:0 0 6px rgba(255,69,58,0.5)}
.pip.hp-off{background:rgba(255,255,255,0.09)}
.pip.ar-on{background:linear-gradient(135deg,#0A84FF,#64B5FF);box-shadow:0 0 6px rgba(10,132,255,0.5)}
.pip.ar-off{background:rgba(255,255,255,0.09)}
.bar-wrap{flex:1;height:5px;background:rgba(255,255,255,0.09);border-radius:3px;overflow:hidden;min-width:90px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.25s var(--ios)}
.bar-mp{background:linear-gradient(90deg,#0A84FF,#5AC8FA)}
.stat-num{font-size:10px;font-variant-numeric:tabular-nums;color:var(--txt-dim);min-width:42px;text-align:right;font-weight:600}

/* ── Weapon card ── */
#wpnCard{position:fixed;bottom:max(16px,env(safe-area-inset-bottom));left:14px;z-index:20;
  padding:10px 16px;display:flex;align-items:center;gap:12px;pointer-events:none}
#wpnIcon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.07);font-size:18px}
#wpnName{font-size:13px;font-weight:700;letter-spacing:-0.01em}
#wpnSub{font-size:10px;color:var(--txt-dim);margin-top:1px;font-weight:500}

/* ── Skill button ── */
#skillBtn{position:fixed;bottom:max(20px,calc(env(safe-area-inset-bottom) + 4px));right:20px;z-index:25;
  width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(232,130,26,0.16);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(232,130,26,0.45);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:transform 0.25s var(--ios),box-shadow 0.25s;color:var(--amber)}
#skillBtn:active{transform:scale(0.9)}
#skillBtn.ready{box-shadow:0 0 28px rgba(232,130,26,0.55);background:rgba(232,130,26,0.28)}
#skillBtn.cd{opacity:0.45;border-color:rgba(255,255,255,0.15);color:var(--txt-dim)}
#skillBtn .ico{font-size:23px;line-height:1}
#skillBtn .lbl{font-size:8.5px;font-weight:700;letter-spacing:0.06em}

/* ── Floor badge ── */
#floorBadge{position:fixed;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:20;
  padding:7px 18px;font-size:12px;font-weight:700;letter-spacing:0.14em;pointer-events:none;border-radius:99px}
#floorBadge .sub{font-size:9px;color:var(--txt-dim);font-weight:600;letter-spacing:0.2em;display:block;text-align:center;margin-top:1px}

/* ── Minimap ── */
#minimap{position:fixed;top:max(14px,env(safe-area-inset-top));right:14px;z-index:20;padding:10px;pointer-events:none}

/* ── Overlays (splash / buff / over) ── */
.overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(8,8,12,0.55);backdrop-filter:blur(40px) saturate(140%);-webkit-backdrop-filter:blur(40px) saturate(140%)}
.overlay.on{display:flex;animation:ovIn 0.5s var(--ios)}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.panel{padding:40px 44px;text-align:center;max-width:min(440px,92vw);animation:panelIn 0.6s var(--ios)}
@keyframes panelIn{from{transform:translateY(26px) scale(0.96);opacity:0}to{transform:none;opacity:1}}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:0.32em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.title-xl{font-size:44px;font-weight:800;letter-spacing:-0.035em;line-height:1.05;margin-bottom:10px;
  background:linear-gradient(160deg,#fff 30%,rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lead{font-size:13.5px;color:var(--txt-dim);line-height:1.65;margin-bottom:30px;font-weight:500}
.btn-primary{width:100%;padding:16px;border-radius:16px;border:none;cursor:pointer;
  font-size:15px;font-weight:700;font-family:inherit;letter-spacing:-0.01em;
  background:var(--amber);color:#fff;
  box-shadow:0 10px 32px rgba(232,130,26,0.42);
  transition:transform 0.25s var(--ios),filter 0.2s}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:active{transform:scale(0.97)}
.btn-ghost{width:100%;padding:13px;border-radius:14px;cursor:pointer;margin-top:10px;
  font-size:13px;font-weight:600;font-family:inherit;
  background:rgba(255,255,255,0.07);color:var(--txt);border:0.5px solid var(--glass-border);
  transition:background 0.2s}
.btn-ghost:hover{background:rgba(255,255,255,0.13)}
.controls-hint{margin-top:26px;font-size:11px;color:rgba(245,245,247,0.35);line-height:2.1;font-weight:500}
.controls-hint kbd{display:inline-block;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,0.08);
  border:0.5px solid rgba(255,255,255,0.12);font-family:ui-monospace,monospace;font-size:10px;margin:0 2px}

/* ── Buff cards ── */
#buffCards{display:flex;gap:12px;margin-top:8px}
.buff-card{flex:1;padding:22px 14px;border-radius:18px;cursor:pointer;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  transition:all 0.3s var(--ios);text-align:center}
.buff-card:hover{background:rgba(232,130,26,0.12);border-color:rgba(232,130,26,0.5);transform:translateY(-4px)}
.buff-card .b-ico{font-size:30px;margin-bottom:10px}
.buff-card .b-name{font-size:13px;font-weight:700;margin-bottom:5px;letter-spacing:-0.01em}
.buff-card .b-desc{font-size:10px;color:var(--txt-dim);line-height:1.5;font-weight:500}

/* ── Hero preview on splash ── */
#heroPrev{width:120px;height:120px;margin:0 auto 18px;image-rendering:pixelated}

/* ── Touch joystick (mobile) ── */
#joy{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:24px;z-index:25;width:110px;height:110px;
  border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  display:none;backdrop-filter:blur(8px)}
#joyKnob{position:absolute;width:46px;height:46px;border-radius:50%;left:32px;top:32px;
  background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.3);transition:none}
#atkBtn{position:fixed;bottom:max(108px,calc(env(safe-area-inset-bottom) + 92px));right:28px;z-index:25;
  width:62px;height:62px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);color:#fff;font-size:22px;display:none;
  align-items:center;justify-content:center}
@media (pointer:coarse){ #joy,#atkBtn{display:flex} }

/* ── Toast ── */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:50;
  padding:9px 20px;border-radius:99px;font-size:12px;font-weight:600;opacity:0;
  transition:all 0.4s var(--ios);pointer-events:none;letter-spacing:-0.005em}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="stage"><canvas id="g"></canvas></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-card glass">
    <div class="stat-row"><span class="stat-icon">❤️</span><div class="pips" id="hpPips"></div></div>
    <div class="stat-row"><span class="stat-icon">🛡</span><div class="pips" id="arPips"></div></div>
    <div class="stat-row"><span class="stat-icon">⚡</span><div class="bar-wrap"><div class="bar-fill bar-mp" id="mpBar" style="width:100%"></div></div><span class="stat-num" id="mpNum">200</span></div>
  </div>
</div>

<div id="floorBadge" class="glass">LEVEL <span id="floorNum">1-1</span><span class="sub" id="floorName">幽暗地牢</span></div>
<div id="minimap" class="glass"><canvas id="mmc" width="120" height="90"></canvas></div>

<div id="wpnCard" class="glass">
  <div id="wpnIcon">🔫</div>
  <div><div id="wpnName">士兵步槍</div><div id="wpnSub">傷害 5 · 能量 1</div></div>
</div>

<button id="skillBtn" class="ready"><span class="ico">⚔️</span><span class="lbl">火力全開</span></button>

<div id="joy"><div id="joyKnob"></div></div>
<button id="atkBtn">⊕</button>

<div id="toast" class="glass"></div>

<!-- Splash -->
<div id="splash" class="overlay on">
  <div class="panel glass">
    <canvas id="heroPrev" width="40" height="40"></canvas>
    <div class="eyebrow">Fabrica Arcade</div>
    <h1 class="title-xl">元氣騎士</h1>
    <p class="lead">魔法石被怪物奪走了。<br>拿起武器，殺進隨機生成的地牢，奪回它。</p>
    <button class="btn-primary" id="startBtn">開始冒險</button>
    <div class="controls-hint">
      <kbd>W A S D</kbd> 移動 · <kbd>滑鼠 / J</kbd> 攻擊（自動瞄準）<br>
      <kbd>Space</kbd> 技能：火力全開 · <kbd>E</kbd> 撿武器
    </div>
  </div>
</div>

<!-- Buff selection -->
<div id="buffOv" class="overlay">
  <div class="panel glass" style="max-width:min(520px,94vw)">
    <div class="eyebrow">Floor Cleared</div>
    <h2 class="title-xl" style="font-size:30px">選擇祝福</h2>
    <p class="lead" style="margin-bottom:18px">下一層更危險。選一個強化吧。</p>
    <div id="buffCards"></div>
  </div>
</div>

<!-- Game over / victory -->
<div id="overOv" class="overlay">
  <div class="panel glass">
    <div class="eyebrow" id="ovEyebrow">Game Over</div>
    <h2 class="title-xl" id="ovTitle">騎士倒下了</h2>
    <p class="lead" id="ovDesc">地牢又一次吞噬了挑戰者。</p>
    <button class="btn-primary" id="againBtn">再次挑戰</button>
    <button class="btn-ghost" id="quitBtn">返回 Fabrica</button>
  </div>
</div>

<script>
'use strict';
// roundRect polyfill (older Safari)
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;
  };
}

/* ════════════════════════════════════════════════════════════════
   元氣騎士 · SOUL KNIGHT — faithful HTML5 remake
   Core Soul Knight mechanics:
   · AUTO-AIM     — weapons target the nearest enemy automatically
   · ENERGY       — guns drain energy, melee is free, energy regens
   · ARMOR REGEN  — shield recovers after 3s without taking damage
   · DUAL WIELD   — Knight skill: double-fire for 6 seconds
   · ROOM LOCK    — doors seal until every monster is dead
   · PROC-GEN     — every floor is a fresh random room layout
   · BUFF PICKS   — choose 1 of 3 blessings between floors
   ════════════════════════════════════════════════════════════════ */

// ── Config ──────────────────────────────────────────────
const TILE=20, VW=860, VH=560;
const cv=document.getElementById('g'), ctx=cv.getContext('2d');
const DPR=Math.min(window.devicePixelRatio||1,2);
cv.width=VW*DPR; cv.height=VH*DPR; ctx.scale(DPR,DPR);
ctx.imageSmoothingEnabled=false;
function fitCanvas(){
  const s=Math.min(window.innerWidth/VW, window.innerHeight/VH);
  cv.style.width=(VW*s)+'px'; cv.style.height=(VH*s)+'px';
}
fitCanvas(); window.addEventListener('resize',fitCanvas);

// ── Utils ──────────────────────────────────────────────
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(ax,ay,bx,by)=>{const dx=bx-ax,dy=by-ay;return dx*dx+dy*dy;};
const dist=(ax,ay,bx,by)=>Math.hypot(bx-ax,by-ay);
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;

// ── Audio ──────────────────────────────────────────────
let AC=null;
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; }
function tone(f,d,v,t,slide){
  const a=ac(); if(!a) return;
  try{
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=t||'square';o.frequency.value=f;
    if(slide)o.frequency.exponentialRampToValueAtTime(slide,a.currentTime+d);
    g.gain.setValueAtTime(v||.06,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d);
  }catch(e){}
}
const SFX={
  shot:()=>tone(rnd(420,480),.05,.04,'square',220),
  melee:()=>tone(180,.08,.06,'sawtooth',90),
  hit:()=>tone(160,.07,.07,'sawtooth'),
  hurt:()=>tone(110,.18,.1,'sawtooth',60),
  die:()=>tone(90,.3,.1,'sawtooth',40),
  pick:()=>tone(740,.1,.06,'sine',1100),
  door:()=>tone(300,.2,.06,'sine',480),
  clear:()=>{tone(523,.1,.06,'sine');setTimeout(()=>tone(659,.1,.06,'sine'),90);setTimeout(()=>tone(784,.16,.07,'sine'),180);},
  skill:()=>{tone(440,.12,.08,'square',880);setTimeout(()=>tone(660,.14,.07,'square',990),80);},
  boss:()=>{tone(70,.5,.13,'sawtooth',45);},
  buff:()=>{tone(659,.1,.06,'sine');setTimeout(()=>tone(880,.16,.07,'sine'),100);},
};

// ── Input ──────────────────────────────────────────────
const K={};
window.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(['Space','KeyE','KeyJ'].includes(e.code))e.preventDefault();
});
window.addEventListener('keyup',e=>{K[e.code]=false;});
let mouseAtk=false;
cv.addEventListener('mousedown',()=>{mouseAtk=true;});
window.addEventListener('mouseup',()=>{mouseAtk=false;});
cv.addEventListener('contextmenu',e=>e.preventDefault());

// Touch joystick
const joy={x:0,y:0,active:false};
const joyEl=document.getElementById('joy'), knob=document.getElementById('joyKnob');
let joyId=null;
joyEl.addEventListener('touchstart',e=>{joyId=e.changedTouches[0].identifier;joy.active=true;e.preventDefault();},{passive:false});
window.addEventListener('touchmove',e=>{
  if(joyId===null)return;
  for(const t of e.changedTouches){
    if(t.identifier===joyId){
      const r=joyEl.getBoundingClientRect();
      let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
      const m=Math.hypot(dx,dy), max=r.width/2-10;
      if(m>max){dx=dx/m*max;dy=dy/m*max;}
      joy.x=dx/max; joy.y=dy/max;
      knob.style.left=(32+dx)+'px'; knob.style.top=(32+dy)+'px';
    }
  }
},{passive:false});
window.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===joyId){joyId=null;joy.active=false;joy.x=0;joy.y=0;knob.style.left='32px';knob.style.top='32px';}
  }
});
let touchAtk=false;
const atkBtn=document.getElementById('atkBtn');
atkBtn.addEventListener('touchstart',e=>{touchAtk=true;e.preventDefault();},{passive:false});
atkBtn.addEventListener('touchend',()=>{touchAtk=false;});

// ── Floor themes ──────────────────────────────────────────────
const THEMES=[
  {name:'幽暗地牢', floor:'#1c1a26', floorAlt:'#201e2c', wall:'#2e2a40', wallTop:'#3a3654', accent:'#6e5cff'},
  {name:'熔岩洞窟', floor:'#241a18', floorAlt:'#2a1e1a', wall:'#41241e', wallTop:'#552e24', accent:'#ff5c3a'},
  {name:'冰霜殿堂', floor:'#16202c', floorAlt:'#1a2532', wall:'#243a50', wallTop:'#2e4a66', accent:'#5ac8fa'},
];

// ── Dungeon generation ──────────────────────────────────────────────
// Rooms placed on a 5x5 cell grid; random walk from center.
// Room types: start / normal / weapon / boss
const RGW=23, RGH=15;      // room interior incl. walls (tiles)
const GAP=7;               // corridor length (tiles)
const CELL_W=RGW+GAP, CELL_H=RGH+GAP;

let rooms=[], roomGrid={}, world={w:0,h:0};
function genFloor(floorIdx){
  rooms=[]; roomGrid={};
  const count=5+floorIdx;          // 6,7,8 rooms
  const cells=[[2,2]];
  const seen={'2,2':true};
  while(cells.length<count){
    const base=cells[ri(0,cells.length-1)];
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    const d=dirs[ri(0,3)];
    const nx=base[0]+d[0], ny=base[1]+d[1];
    const key=nx+','+ny;
    if(nx<0||ny<0||nx>4||ny>4||seen[key])continue;
    seen[key]=true; cells.push([nx,ny]);
  }
  // farthest cell from start = boss room
  let bossI=1,bd=0;
  for(let i=1;i<cells.length;i++){
    const dd=Math.abs(cells[i][0]-2)+Math.abs(cells[i][1]-2);
    if(dd>bd){bd=dd;bossI=i;}
  }
  // one weapon room (not start, not boss)
  let wpnI=-1;
  if(cells.length>3){ do{wpnI=ri(1,cells.length-1);}while(wpnI===bossI); }

  cells.forEach((c,i)=>{
    const r={
      cx:c[0], cy:c[1],
      x:c[0]*CELL_W*TILE, y:c[1]*CELL_H*TILE,
      w:RGW*TILE, h:RGH*TILE,
      type: i===0?'start': i===bossI?'boss': i===wpnI?'weapon':'normal',
      cleared:i===0, visited:i===0, locked:false,
      doors:{}, enemies:[], drops:[],
    };
    rooms.push(r); roomGrid[c[0]+','+c[1]]=r;
  });
  // connect doors between adjacent occupied cells
  for(const r of rooms){
    const n={r:roomGrid[(r.cx+1)+','+r.cy], l:roomGrid[(r.cx-1)+','+r.cy],
             d:roomGrid[r.cx+','+(r.cy+1)], u:roomGrid[r.cx+','+(r.cy-1)]};
    for(const k in n) if(n[k]) r.doors[k]=true;
  }
  world.w=5*CELL_W*TILE; world.h=5*CELL_H*TILE;
}
function roomAt(x,y){
  for(const r of rooms){
    if(x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h) return r;
  }
  return null;
}
// Corridor rects between rooms (for collision + draw)
function corridors(){
  const cs=[];
  for(const r of rooms){
    if(r.doors.r){
      const o=roomGrid[(r.cx+1)+','+r.cy];
      cs.push({x:r.x+r.w, y:r.y+r.h/2-TILE*1.5, w:o.x-(r.x+r.w), h:TILE*3});
    }
    if(r.doors.d){
      const o=roomGrid[r.cx+','+(r.cy+1)];
      cs.push({x:r.x+r.w/2-TILE*1.5, y:r.y+r.h, w:TILE*3, h:o.y-(r.y+r.h)});
    }
  }
  return cs;
}
let corridorRects=[];

// ── Weapons (Soul Knight style: dmg / energy / firerate) ─────────────
const WEAPONS={
  rifle:  {n:'士兵步槍', ico:'🔫', type:'gun',   dmg:5, en:1, rate:.16, spd:430, spread:.05, col:'#FFD60A', shots:1},
  pistol: {n:'壞蛋手槍', ico:'🔫', type:'gun',   dmg:7, en:1, rate:.24, spd:400, spread:.04, col:'#FF9F0A', shots:1},

// ── Bullets ──────────────────────────────────────────────
const bullets=[];
function fire(x,y,ang,w,isP,dmgMul){
  const shots=w.shots||1;
  for(let i=0;i<shots;i++){
    const a=ang+(shots>1?(i-(shots-1)/2)*w.spread:rnd(-w.spread,w.spread));
    bullets.push({
      x,y,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,
      dmg:Math.round(w.dmg*(dmgMul||1)),col:w.col,r:w.pierce?3:3.5,
      life:1.6,isP:!!isP,pierce:!!w.pierce,bounce:w.bounce||0,hitList:[],
    });
  }
}

// ── AUTO-AIM: core Soul Knight mechanic ──────────────────────────────
// Finds nearest living enemy in the player's current room (or corridor LOS)
function autoAim(){
  const room=roomAt(P.x,P.y);
  let best=null,bd=Infinity;
  const pool=room?room.enemies:[];
  for(const e of pool){
    if(e.dead)continue;
    const d=dist2(P.x,P.y,e.x,e.y);
    if(d<bd){bd=d;best=e;}
  }
  P.aimTarget=best;
  if(best)P.aimAng=Math.atan2(best.y-P.y,best.x-P.x);
  return best;
}

function playerAttack(){
  if(P.atkCd>0)return;
  const w=P.wpn;
  const dual=P.skillT>0;                 // 火力全開: dual wield active
  const enCost=w.en*(dual?2:1);          // double energy drain (from wiki)
  if(w.type==='gun'&&P.en<enCost)return; // not enough energy
  P.atkCd=w.rate*(dual?.62:1);

  const tgt=autoAim();
  const ang=tgt?P.aimAng:(P.face>0?0:Math.PI);

  if(w.type==='melee'){
    SFX.melee();
    meleeSwing={ang,t:.14,range:w.range};
    const room=roomAt(P.x,P.y);
    if(room)for(const e of room.enemies){
      if(e.dead)continue;
      const d=dist(P.x,P.y,e.x,e.y);
      if(d<w.range+e.r){
        const ea=Math.atan2(e.y-P.y,e.x-P.x);
        let da=Math.abs(ea-ang); da=Math.min(da,TAU-da);
        if(da<w.arc/2+.3){
          const crit=Math.random()<P.crit;
          dmgEnemy(e,Math.round(w.dmg*P.dmgMul*(crit?2:1)),crit);
          e.vx+=Math.cos(ea)*180; e.vy+=Math.sin(ea)*180;
        }
      }
    }
    if(dual){ // dual melee: second swing behind
      meleeSwing2={ang:ang+Math.PI,t:.14,range:w.range};
    }
  }else{
    P.en=Math.max(0,P.en-enCost);
    SFX.shot();
    const ox=P.x+Math.cos(ang)*12, oy=P.y+Math.sin(ang)*12;
    fire(ox,oy,ang,w,true,P.dmgMul*(Math.random()<P.crit?2:1));
    if(dual){ // dual gun: second muzzle slightly offset
      fire(P.x+Math.cos(ang+.5)*12,P.y+Math.sin(ang+.5)*12,ang+rnd(-.06,.06),w,true,P.dmgMul);
    }
    muzzle={x:ox,y:oy,t:.05};
  }
}
let meleeSwing=null, meleeSwing2=null, muzzle=null;

function useSkill(){
  if(P.skillCd>0||P.skillT>0)return;
  P.skillT=P.SKILL_DUR; P.skillCd=P.SKILL_CD;
  SFX.skill();
  spawnRing(P.x,P.y,'#E8821A');
  toast('⚔️ 火力全開！');
}

function hurtPlayer(d){
  if(P.inv>0||P.dead)return;
  P.armorTimer=0;             // reset armor regen timer
  if(P.armor>0){ P.armor--; SFX.hit(); spawnP(P.x,P.y,'#5AC8FA',6,90); }
  else{
    P.hp=Math.max(0,P.hp-1);  // Soul Knight: 1 heart per hit
    SFX.hurt(); spawnP(P.x,P.y,'#FF453A',8,110); shakeAmt=Math.max(shakeAmt,.55);
    if(P.hp<=0){P.dead=true;SFX.die();setTimeout(()=>endGame(false),900);return;}
  }
  P.inv=.9;
}

function tickPlayer(dt){
  if(P.dead)return;
  // Move
  let dx=0,dy=0;
  if(K.KeyA||K.ArrowLeft)dx-=1;
  if(K.KeyD||K.ArrowRight)dx+=1;
  if(K.KeyW||K.ArrowUp)dy-=1;
  if(K.KeyS||K.ArrowDown)dy+=1;
  if(joy.active){dx=joy.x;dy=joy.y;}
  const m=Math.hypot(dx,dy);
  if(m>1){dx/=m;dy/=m;}
  P.moving=m>0.1;
  if(P.moving)P.anim+=dt*9;
  if(dx!==0)P.face=dx>0?1:-1;
  const sp=P.spd*P.spdMul;
  moveEntity(P,dx*sp*dt,dy*sp*dt);

  // Timers
  if(P.atkCd>0)P.atkCd-=dt;
  if(P.inv>0)P.inv-=dt;
  if(P.skillT>0)P.skillT-=dt;
  else if(P.skillCd>0)P.skillCd-=dt;

  // ARMOR REGEN — Soul Knight signature: +1 shield per 1.2s after 3s no-hit
  P.armorTimer+=dt;
  if(P.armorTimer>3&&P.armor<P.maxArmor){
    P.armorTimer=3-1.2;        // next pip in 1.2s
    P.armor++;
    spawnP(P.x,P.y-12,'#5AC8FA',3,40);
  }
  // Energy slow regen
  P.en=Math.min(P.maxEn,P.en+3.2*dt);

  // Attack (mouse / J / touch)
  if(mouseAtk||K.KeyJ||touchAtk)playerAttack();
  // Skill
  if(K.Space&&!K._sp)useSkill();
  K._sp=K.Space;
  // Pickup
  if(K.KeyE&&!K._e)tryPickup();
  K._e=K.KeyE;
  autoAim();
}

// Wall-aware movement: rooms + corridors are walkable
function walkable(x,y,r){
  // inside a room interior?
  for(const rm of rooms){
    if(x-r>=rm.x+TILE&&x+r<=rm.x+rm.w-TILE&&y-r>=rm.y+TILE&&y+r<=rm.y+rm.h-TILE)return true;
  }
  for(const c of corridorRects){
    if(x-r>=c.x-2&&x+r<=c.x+c.w+2&&y-r>=c.y+2&&y+r<=c.y+c.h-2)return true;
  }
  // door thresholds: allow crossing where corridor meets room
  for(const c of corridorRects){
    if(x>=c.x-TILE&&x<=c.x+c.w+TILE&&y>=c.y&&y<=c.y+c.h)return true;
  }
  return false;
}
function moveEntity(e,mx,my){
  // locked room: keep player inside
  const cur=roomAt(e.x,e.y);
  if(e===P&&cur&&cur.locked){
    e.x=clamp(e.x+mx,cur.x+TILE+e.r,cur.x+cur.w-TILE-e.r);
    e.y=clamp(e.y+my,cur.y+TILE+e.r,cur.y+cur.h-TILE-e.r);
    return;
  }
  if(walkable(e.x+mx,e.y,e.r))e.x+=mx;
  if(walkable(e.x,e.y+my,e.r))e.y+=my;
}

function tryPickup(){
  const room=roomAt(P.x,P.y); if(!room)return;
  for(let i=room.drops.length-1;i>=0;i--){
    const d=room.drops[i];
    if(dist(P.x,P.y,d.x,d.y)<30){
      P.wpn={...WEAPONS[d.id],id:d.id};
      room.drops.splice(i,1);
      SFX.pick(); toast(WEAPONS[d.id].ico+' 拾取 '+WEAPONS[d.id].n);
      updateWpnCard();
      return;
    }
  }
}

// ── Enemies (Soul Knight bestiary) ──────────────────────────────
const ETYPES={
  slime:  {n:'史萊姆', hp:10, spd:62,  r:9,  atkType:'contact', dmg:1, col:'#8FE36B', col2:'#B6F09A'},
  bat:    {n:'蝙蝠',   hp:6,  spd:96,  r:7,  atkType:'contact', dmg:1, col:'#9B8AFF', col2:'#C2B6FF'},
  goblin: {n:'哥布林', hp:14, spd:74,  r:9,  atkType:'shoot',   dmg:1, col:'#FF9F0A', col2:'#FFC56B', rate:1.6, bspd:230},
  skull:  {n:'骷髏兵', hp:20, spd:58,  r:10, atkType:'shoot',   dmg:1, col:'#E8E8ED', col2:'#fff',    rate:1.2, bspd:260, shots:3},
  golem:  {n:'石魔像', hp:38, spd:40,  r:14, atkType:'contact', dmg:2, col:'#A0A0B2', col2:'#C8C8DA'},
};
function makeEnemy(type,x,y,scale){
  const t=ETYPES[type];
  const s=scale||1;
  return {type,x,y,vx:0,vy:0,r:t.r,
    hp:Math.round(t.hp*s),maxHp:Math.round(t.hp*s),
    spd:t.spd,dmg:t.dmg,atkType:t.atkType,
    rate:t.rate||0,bspd:t.bspd||0,shots:t.shots||1,
    col:t.col,col2:t.col2,
    atkCd:rnd(.4,1.4),stun:0,dead:false,anim:rnd(0,9),face:1,
    spawnT:.5,   // spawn telegraph
  };
}
function dmgEnemy(e,d,crit){
  if(e.dead||e.spawnT>0)return;
  e.hp-=d; e.stun=Math.max(e.stun,.1);
  spawnP(e.x,e.y,'#FF453A',4,80);
  spawnDmgNum(e.x,e.y-e.r-4,d,crit);
  SFX.hit();
  if(e.hp<=0){
    e.dead=true; SFX.die();
    spawnP(e.x,e.y,e.col,12,140);
    score+=10;
    // small chance: energy orb drop
    if(Math.random()<.3)orbs.push({x:e.x,y:e.y,t:'en',v:14});
    if(Math.random()<.08)orbs.push({x:e.x,y:e.y,t:'hp',v:1});
  }
}
function tickEnemy(e,dt,room){
  if(e.dead)return;
  if(e.spawnT>0){e.spawnT-=dt;return;}
  e.anim+=dt*7;
  if(e.stun>0){e.stun-=dt;e.x+=e.vx*dt;e.y+=e.vy*dt;e.vx*=.85;e.vy*=.85;}
  else{
    const d=dist(e.x,e.y,P.x,P.y);
    if(e.atkType==='contact'){
      // chase
      const a=Math.atan2(P.y-e.y,P.x-e.x);
      e.vx=lerp(e.vx,Math.cos(a)*e.spd,5*dt);
      e.vy=lerp(e.vy,Math.sin(a)*e.spd,5*dt);
      if(d<e.r+P.r+2&&e.atkCd<=0){hurtPlayer(e.dmg);e.atkCd=.8;}
    }else{
      // shooter: keep distance ~140, strafe
      const a=Math.atan2(P.y-e.y,P.x-e.x);
      const want=d>170?1:d<110?-1:0;
      const strafe=Math.sin(e.anim*.6)*.7;
      e.vx=lerp(e.vx,(Math.cos(a)*want+Math.cos(a+Math.PI/2)*strafe)*e.spd,4*dt);
      e.vy=lerp(e.vy,(Math.sin(a)*want+Math.sin(a+Math.PI/2)*strafe)*e.spd,4*dt);
      if(e.atkCd<=0&&d<300){
        e.atkCd=e.rate;
        for(let i=0;i<e.shots;i++){
          const sa=a+(e.shots>1?(i-(e.shots-1)/2)*.22:0);
          bullets.push({x:e.x,y:e.y,vx:Math.cos(sa)*e.bspd,vy:Math.sin(sa)*e.bspd,
            dmg:e.dmg,col:'#FF6B9D',r:3.2,life:2.4,isP:false});
        }
      }
    }
    if(e.atkCd>0)e.atkCd-=dt;
    e.face=e.vx>0?1:e.vx<0?-1:e.face;
  }
  // confine to room
  e.x=clamp(e.x+(e.stun>0?0:e.vx*dt),room.x+TILE+e.r,room.x+room.w-TILE-e.r);
  e.y=clamp(e.y+(e.stun>0?0:e.vy*dt),room.y+TILE+e.r,room.y+room.h-TILE-e.r);
}

// ── Boss: 騎士團長級頭目 (multi-phase bullet hell) ──────────────
let boss=null;
function makeBoss(room,floorIdx){
  const names=['暗影巨像','熔岩魔王','冰霜君主'];
  return {
    isBoss:true,
    x:room.x+room.w/2, y:room.y+room.h*.35,
    r:24, hp:240+floorIdx*120, maxHp:240+floorIdx*120,
    name:names[floorIdx]||'???',
    phase:1, t:0, atkCd:1.5, spiral:0,
    vx:0,vy:0,stun:0,dead:false,anim:0,face:1,spawnT:1,
    col:THEMES[floorIdx].accent,
    dmg:1,
  };
}
function tickBoss(b,dt,room){
  if(b.dead)return;
  if(b.spawnT>0){b.spawnT-=dt;return;}
  b.anim+=dt*4; b.t+=dt;
  // Phase by HP
  const pct=b.hp/b.maxHp;
  b.phase=pct>.66?1:pct>.33?2:3;
  // Drift toward player slowly
  const a=Math.atan2(P.y-b.y,P.x-b.x);
  const spd=34+b.phase*12;
  b.vx=lerp(b.vx,Math.cos(a)*spd,2*dt);
  b.vy=lerp(b.vy,Math.sin(a)*spd,2*dt);
  b.x=clamp(b.x+b.vx*dt,room.x+TILE+b.r,room.x+room.w-TILE-b.r);
  b.y=clamp(b.y+b.vy*dt,room.y+TILE+b.r,room.y+room.h-TILE-b.r);

  if(b.atkCd>0){b.atkCd-=dt;return;}
  // Attack patterns per phase
  const pats=b.phase===1?['ring']:b.phase===2?['ring','aim']:['spiral','aim','ring'];
  const pat=pats[ri(0,pats.length-1)];
  if(pat==='ring'){
    const n=b.phase===3?18:12;
    for(let i=0;i<n;i++){
      const ra=i/n*TAU+b.spiral;
      bullets.push({x:b.x,y:b.y,vx:Math.cos(ra)*150,vy:Math.sin(ra)*150,
        dmg:1,col:b.col,r:4,life:3.2,isP:false});
    }
    b.atkCd=b.phase===3?1.1:1.7;
  }else if(pat==='aim'){
    for(let i=-2;i<=2;i++){
      const aa=a+i*.14;
      bullets.push({x:b.x,y:b.y,vx:Math.cos(aa)*270,vy:Math.sin(aa)*270,
        dmg:1,col:'#FF6B9D',r:3.5,life:2.6,isP:false});
    }
    b.atkCd=1.3;
  }else{
    // spiral burst
    for(let k=0;k<3;k++){
      setTimeout(()=>{
        if(b.dead)return;
        for(let i=0;i<8;i++){
          const ra=i/8*TAU+b.spiral+k*.26;
          bullets.push({x:b.x,y:b.y,vx:Math.cos(ra)*180,vy:Math.sin(ra)*180,
            dmg:1,col:b.col,r:3.5,life:3,isP:false});
        }
      },k*160);
    }
    b.atkCd=2;
  }
  b.spiral+=.5;
  // contact damage
  if(dist(b.x,b.y,P.x,P.y)<b.r+P.r)hurtPlayer(1);
}
function dmgBoss(b,d,crit){
  if(b.dead||b.spawnT>0)return;
  b.hp-=d; spawnP(b.x,b.y,'#FF453A',4,90); spawnDmgNum(b.x,b.y-b.r-6,d,crit); SFX.hit();
  if(b.hp<=0){
    b.dead=true; SFX.clear();
    spawnP(b.x,b.y,b.col,40,260); spawnRing(b.x,b.y,b.col); shakeAmt=2;
    score+=200;
  }
}

// ── Room population / lock system ──────────────────────────────
function populateRoom(room,floorIdx){
  room.enemies=[];
  const lvl=floorIdx+1;
  if(room.type==='boss'){
    boss=makeBoss(room,floorIdx);
    room.enemies.push(boss);
    SFX.boss();
    return;
  }
  if(room.type==='weapon'){
    // 2 random weapon drops
    const a=WPN_POOL[ri(0,WPN_POOL.length-1)];
    let b; do{b=WPN_POOL[ri(0,WPN_POOL.length-1)];}while(b===a);
    room.drops.push({x:room.x+room.w/2-40,y:room.y+room.h/2,id:a});
    room.drops.push({x:room.x+room.w/2+40,y:room.y+room.h/2,id:b});
    room.cleared=true;
    return;
  }
  const types=['slime','slime','bat','goblin'];
  if(lvl>=2)types.push('skull','goblin');
  if(lvl>=3)types.push('golem','skull');
  const count=ri(3+lvl,5+lvl);
  for(let i=0;i<count;i++){
    const t=types[ri(0,types.length-1)];
    let ex,ey,tries=0;
    do{
      ex=rnd(room.x+TILE*2.5,room.x+room.w-TILE*2.5);
      ey=rnd(room.y+TILE*2.5,room.y+room.h-TILE*2.5);
      tries++;
    }while(dist(ex,ey,P.x,P.y)<110&&tries<20);
    room.enemies.push(makeEnemy(t,ex,ey,1+floorIdx*.25));
  }
}
function enterRoom(room){
  if(room.visited)return;
  room.visited=true;
  if(room.type==='normal'||room.type==='boss'){
    populateRoom(room,floorIdx);
    room.locked=true;
    SFX.door();
    if(room.type==='boss')toast('⚠️ '+boss.name+' 出現！');
  }else populateRoom(room,floorIdx);
}
function checkRoomClear(room){
  if(!room.locked)return;
  const alive=room.enemies.filter(e=>!e.dead).length;
  if(alive===0){
    room.locked=false; room.cleared=true;
    SFX.clear(); spawnRing(P.x,P.y,'#FFD60A');
    if(room.type==='boss'){
      setTimeout(()=>floorClear(),800);
    }else{
      // reward: energy orbs
      for(let i=0;i<3;i++)orbs.push({x:room.x+room.w/2+rnd(-30,30),y:room.y+room.h/2+rnd(-30,30),t:'en',v:18});
    }
  }
}

// ── Orbs (energy / hp pickups) ──────────────────────────────
const orbs=[];
function tickOrbs(dt){
  for(let i=orbs.length-1;i>=0;i--){
    const o=orbs[i];
    const d=dist(o.x,o.y,P.x,P.y);
    if(d<70){ // magnet
      const a=Math.atan2(P.y-o.y,P.x-o.x);
      o.x+=Math.cos(a)*240*dt; o.y+=Math.sin(a)*240*dt;
    }
    if(d<14){
      if(o.t==='en'){P.en=Math.min(P.maxEn,P.en+o.v);}
      else{P.hp=Math.min(P.maxHp,P.hp+o.v);}
      SFX.pick(); orbs.splice(i,1);
    }
  }
}

// ── Particles / FX ──────────────────────────────
const parts=[],dmgNums=[],rings=[];
function spawnP(x,y,col,n,sp){
  for(let i=0;i<n;i++){
    const a=rnd(0,TAU),s=rnd(sp*.4,sp);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:rnd(.2,.5),max:.5,sz:rnd(2,4)});
  }
}
function spawnDmgNum(x,y,d,crit){
  dmgNums.push({x:x+rnd(-6,6),y,v:d,t:.7,crit:!!crit});
}
function spawnRing(x,y,col){rings.push({x,y,r:6,col,t:.5});}
function tickFX(dt){
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.life-=dt;if(p.life<=0){parts.splice(i,1);continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.92;p.vy*=.92;}
  for(let i=dmgNums.length-1;i>=0;i--){const d=dmgNums[i];d.t-=dt;d.y-=34*dt;if(d.t<=0)dmgNums.splice(i,1);}
  for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.t-=dt;r.r+=190*dt;if(r.t<=0)rings.splice(i,1);}
}

// ── Camera ──────────────────────────────
const cam={x:0,y:0};
let shakeAmt=0;
function tickCam(dt){
  cam.x=lerp(cam.x,P.x-VW/2,8*dt);
  cam.y=lerp(cam.y,P.y-VH/2,8*dt);
  shakeAmt=Math.max(0,shakeAmt-dt*2.2);
}

// ── Bullet physics ──────────────────────────────
function tickBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.life-=dt;
    if(b.life<=0){bullets.splice(i,1);continue;}
    const nx=b.x+b.vx*dt, ny=b.y+b.vy*dt;
    // wall collision
    if(!walkable(nx,ny,2)){
      if(b.bounce>0){
        if(!walkable(nx,b.y,2))b.vx*=-1;
        if(!walkable(b.x,ny,2))b.vy*=-1;
        b.bounce--;
      }else{
        spawnP(b.x,b.y,b.col,3,50);
        bullets.splice(i,1);continue;
      }
    }
    b.x+=b.vx*dt; b.y+=b.vy*dt;

    if(b.isP){
      const room=roomAt(b.x,b.y);
      if(room){
        let consumed=false;
        for(const e of room.enemies){
          if(e.dead||e.spawnT>0||b.hitList.includes(e))continue;
          if(dist2(b.x,b.y,e.x,e.y)<(e.r+b.r)*(e.r+b.r)){
            if(e.isBoss)dmgBoss(e,b.dmg);
            else{
              dmgEnemy(e,b.dmg);
              const ka=Math.atan2(e.y-b.y,e.x-b.x);
              e.vx+=Math.cos(ka)*120; e.vy+=Math.sin(ka)*120;
            }
            if(b.pierce){b.hitList.push(e);}
            else{spawnP(b.x,b.y,b.col,4,60);bullets.splice(i,1);consumed=true;}
            break;
          }
        }
        if(consumed)continue;
      }
    }else{
      if(P.inv<=0&&!P.dead&&dist2(b.x,b.y,P.x,P.y)<(P.r+b.r)*(P.r+b.r)){
        hurtPlayer(b.dmg); bullets.splice(i,1);
      }
    }
  }
}

// ── Drawing ──────────────────────────────
function px(x){return Math.round(x);}

// Chibi Knight: big head, tiny body, silver armor, ORANGE-RED SCARF (signature)
function drawKnight(x,y){
  const f=P.face;
  const bob=P.moving?Math.sin(P.anim)*1.6:Math.sin(performance.now()/600)*.8;
  const flick=P.inv>0&&Math.floor(P.inv*14)%2===0;
  if(flick)ctx.globalAlpha=.4;
  const sx=px(x),sy=px(y+bob);

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();ctx.ellipse(sx,px(y)+13,8,3,0,0,TAU);ctx.fill();

  // legs (tiny, walking)
  const lw=P.moving?Math.sin(P.anim*2)*2.4:0;
  ctx.fillStyle='#3A3A45';
  ctx.fillRect(sx-5,sy+7+lw*.5,4,5);
  ctx.fillRect(sx+1,sy+7-lw*.5,4,5);

  // body (silver armor, small)
  ctx.fillStyle='#C5C9D6';
  ctx.fillRect(sx-6,sy,12,9);
  ctx.fillStyle='#9BA0B0';
  ctx.fillRect(sx-6,sy+6,12,3);
  // chest plate line
  ctx.fillStyle='#E2E5EE';
  ctx.fillRect(sx-6,sy,12,2);

  // SCARF — orange-red, trailing behind (signature Soul Knight Knight)
  ctx.fillStyle='#FF4F2E';
  ctx.fillRect(sx-7,sy-1,14,4);
  const trail=P.moving?5:3;
  ctx.fillRect(sx-f*7-(f>0?trail:0),sy,trail,3+Math.sin(P.anim*1.5)*1);
  ctx.fillStyle='#E8401F';
  ctx.fillRect(sx-f*7-(f>0?trail:0),sy+2,trail,2);

  // head (BIG, chibi)
  ctx.fillStyle='#F2D4B0';                       // face
  ctx.fillRect(sx-8,sy-15,16,14);
  // helmet (silver, covers top + sides)
  ctx.fillStyle='#D4D8E4';
  ctx.fillRect(sx-9,sy-17,18,7);                 // dome
  ctx.fillRect(sx-9,sy-17,3,13);                 // left side
  ctx.fillRect(sx+6,sy-17,3,13);                 // right side
  ctx.fillStyle='#B8BDCB';
  ctx.fillRect(sx-9,sy-11,18,1.5);               // helmet rim
  // helmet shine
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillRect(sx-6,sy-16,4,2);

  // eyes (look toward aim target)
  const lookX=P.aimTarget?clamp((P.aimTarget.x-P.x)*.02,-2,2):f*1.5;
  ctx.fillStyle='#22232B';
  ctx.fillRect(sx-4+lookX,sy-9,2.6,3.6);
  ctx.fillRect(sx+2+lookX,sy-9,2.6,3.6);
  // eye shine
  ctx.fillStyle='#fff';
  ctx.fillRect(sx-3.6+lookX,sy-8.6,1,1);
  ctx.fillRect(sx+2.4+lookX,sy-8.6,1,1);

  // weapon (aims at auto-aim angle)
  const w=P.wpn;
  const ang=P.aimTarget?P.aimAng:(f>0?0:Math.PI);
  ctx.save();
  ctx.translate(sx,sy+3);
  ctx.rotate(ang);
  if(w.type==='melee'){
    ctx.fillStyle='#888D9E';ctx.fillRect(6,-1.5,14,3);
    ctx.fillStyle='#E2E5EE';ctx.fillRect(16,-2.5,7,5);
    ctx.fillStyle='#6B4A2B';ctx.fillRect(4,-2,4,4);
  }else{
    ctx.fillStyle='#454A58';ctx.fillRect(5,-2.5,15,5);
    ctx.fillStyle=w.col;ctx.fillRect(17,-1.5,4,3);
    ctx.fillStyle='#2C2F38';ctx.fillRect(8,1,4,4);
  }
  ctx.restore();
  // dual wield: second weapon mirrored
  if(P.skillT>0){
    ctx.save();
    ctx.translate(sx,sy+3);
    ctx.rotate(ang+Math.PI*.9);
    ctx.fillStyle='#454A58';ctx.fillRect(5,-2.5,15,5);
    ctx.fillStyle='#E8821A';ctx.fillRect(17,-1.5,4,3);
    ctx.restore();
    // aura
    ctx.strokeStyle='rgba(232,130,26,'+(0.3+Math.sin(performance.now()/120)*.15)+')';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(sx,sy,16,0,TAU);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // auto-aim reticle on target
  if(P.aimTarget&&!P.aimTarget.dead){
    const t=P.aimTarget;
    const pulse=1+Math.sin(performance.now()/150)*.12;
    ctx.strokeStyle='rgba(232,130,26,0.85)';
    ctx.lineWidth=1.5;
    const rr=(t.r+7)*pulse;
    const tx=px(t.x-cam.x),ty=px(t.y-cam.y);
    ctx.beginPath();
    for(let i=0;i<4;i++){
      const a0=i*Math.PI/2+performance.now()/600;
      ctx.moveTo(tx+Math.cos(a0)*rr,ty+Math.sin(a0)*rr);
      ctx.arc(tx,ty,rr,a0,a0+.6);
    }
    ctx.stroke();
  }
}

function drawEnemy(e){
  if(e.dead)return;
  const ex=px(e.x-cam.x),ey=px(e.y-cam.y);
  if(e.spawnT>0){
    // spawn telegraph circle
    ctx.strokeStyle='rgba(255,255,255,'+(0.5*(1-e.spawnT/.5))+')';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(ex,ey,e.r+4,0,TAU*(1-e.spawnT/.5));ctx.stroke();
    return;
  }
  const bob=Math.sin(e.anim)*1.5;
  const flick=e.stun>0;
  if(flick)ctx.globalAlpha=.6;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(ex,ey+e.r+2,e.r*.8,2.5,0,0,TAU);ctx.fill();

  if(e.isBoss){drawBossSprite(e,ex,ey);ctx.globalAlpha=1;return;}

  if(e.type==='slime'){
    const squish=1+Math.sin(e.anim*1.4)*.1;
    ctx.fillStyle=e.col;
    ctx.beginPath();ctx.ellipse(ex,ey+bob,e.r*1.1*squish,e.r*.85/squish,0,0,TAU);ctx.fill();
    ctx.fillStyle=e.col2;
    ctx.beginPath();ctx.ellipse(ex-2,ey+bob-3,e.r*.5,e.r*.35,0,0,TAU);ctx.fill();
    ctx.fillStyle='#1A2415';
    ctx.fillRect(ex-4+e.face*1,ey+bob-2,2.2,3);
    ctx.fillRect(ex+2+e.face*1,ey+bob-2,2.2,3);
  }else if(e.type==='bat'){
    const wing=Math.sin(e.anim*3)*5;
    ctx.fillStyle=e.col;
    ctx.beginPath();ctx.ellipse(ex,ey+bob,e.r,e.r*.9,0,0,TAU);ctx.fill();
    // wings
    ctx.fillStyle=e.col2;
    ctx.beginPath();ctx.ellipse(ex-e.r-3,ey+bob+wing*.4,6,3,-.5,0,TAU);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex+e.r+3,ey+bob-wing*.4,6,3,.5,0,TAU);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(ex-3,ey+bob-2,2,2);ctx.fillRect(ex+1.5,ey+bob-2,2,2);
  }else if(e.type==='goblin'){
    // body
    ctx.fillStyle=e.col;ctx.fillRect(ex-5,ey+bob-2,10,9);
    // big head
    ctx.fillStyle=e.col2;ctx.fillRect(ex-6,ey+bob-12,12,10);
    // ears
    ctx.fillStyle=e.col;
    ctx.fillRect(ex-9,ey+bob-10,3,4);ctx.fillRect(ex+6,ey+bob-10,3,4);
    // eyes
    ctx.fillStyle='#3A1A00';
    ctx.fillRect(ex-3.5+e.face,ey+bob-9,2,3);ctx.fillRect(ex+1.5+e.face,ey+bob-9,2,3);
  }else if(e.type==='skull'){
    // skull head
    ctx.fillStyle=e.col;ctx.fillRect(ex-6,ey+bob-13,12,11);
    ctx.fillRect(ex-4,ey+bob-3,8,3);
    // eye sockets
    ctx.fillStyle='#1A0A1E';
    ctx.fillRect(ex-4,ey+bob-10,3,4);ctx.fillRect(ex+1,ey+bob-10,3,4);
    // glow eyes
    ctx.fillStyle='#FF3B6B';
    ctx.fillRect(ex-3.4,ey+bob-9,1.8,2);ctx.fillRect(ex+1.6,ey+bob-9,1.8,2);
    // body (rib)
    ctx.fillStyle='#C8C8D8';ctx.fillRect(ex-4,ey+bob,8,8);
    ctx.fillStyle='#9898A8';
    ctx.fillRect(ex-4,ey+bob+2,8,1);ctx.fillRect(ex-4,ey+bob+5,8,1);
  }else{
    // golem: stone blocks
    ctx.fillStyle=e.col;
    ctx.fillRect(ex-e.r,ey+bob-e.r,e.r*2,e.r*2);
    ctx.fillStyle=e.col2;
    ctx.fillRect(ex-e.r+2,ey+bob-e.r+2,e.r*2-4,4);
    ctx.fillStyle='#FFD60A';
    ctx.fillRect(ex-5+e.face*2,ey+bob-5,3,3);ctx.fillRect(ex+2+e.face*2,ey+bob-5,3,3);
    // cracks
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ex-4,ey+bob+2);ctx.lineTo(ex+1,ey+bob+6);ctx.stroke();
  }

  // HP bar (only when damaged)
  if(e.hp<e.maxHp){
    const bw=e.r*2.2;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(ex-bw/2,ey-e.r-9,bw,3.5);
    ctx.fillStyle='#FF453A';
    ctx.fillRect(ex-bw/2,ey-e.r-9,bw*(e.hp/e.maxHp),3.5);
  }
  ctx.globalAlpha=1;
}

function drawBossSprite(b,ex,ey){
  const t=b.anim;
  // aura
  const g=ctx.createRadialGradient(ex,ey,b.r*.4,ex,ey,b.r*2.2);
  g.addColorStop(0,b.col+'44');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(ex,ey,b.r*2.2,0,TAU);ctx.fill();
  // big chibi body
  const bob=Math.sin(t)*3;
  ctx.fillStyle='#2A2438';
  ctx.fillRect(ex-b.r*.7,ey+bob-b.r*.2,b.r*1.4,b.r*1.1);
  // huge head
  ctx.fillStyle='#3A3050';
  ctx.fillRect(ex-b.r*.85,ey+bob-b.r*1.2,b.r*1.7,b.r*1.1);
  // crown
  ctx.fillStyle=b.col;
  for(let i=0;i<3;i++)ctx.fillRect(ex-b.r*.6+i*b.r*.5,ey+bob-b.r*1.45,b.r*.28,b.r*.3);
  // eyes (phase = eye intensity)
  const ec=b.phase===3?'#FF3B30':b.phase===2?'#FF9F0A':b.col;
  ctx.fillStyle=ec;
  ctx.fillRect(ex-b.r*.45,ey+bob-b.r*.85,b.r*.3,b.r*.35);
  ctx.fillRect(ex+b.r*.15,ey+bob-b.r*.85,b.r*.3,b.r*.35);
  ctx.fillStyle='#fff';
  ctx.fillRect(ex-b.r*.4,ey+bob-b.r*.8,b.r*.1,b.r*.12);
  ctx.fillRect(ex+b.r*.2,ey+bob-b.r*.8,b.r*.1,b.r*.12);
  // mouth (phase 3 = open)
  if(b.phase===3){
    ctx.fillStyle='#1A0A1E';
    ctx.fillRect(ex-b.r*.3,ey+bob-b.r*.3,b.r*.6,b.r*.22);
  }
}

// ── Room / world drawing ──────────────────────────────
function drawWorld(){
  // Rooms
  const th=THEMES[floorIdx];
  for(const r of rooms){
    const rx=px(r.x-cam.x),ry=px(r.y-cam.y);
    if(rx+r.w<-40||rx>VW+40||ry+r.h<-40||ry>VH+40)continue;
    // floor checker
    for(let ty=1;ty<RGH-1;ty++)for(let tx=1;tx<RGW-1;tx++){
      ctx.fillStyle=(tx+ty)%2?th.floor:th.floorAlt;
      ctx.fillRect(rx+tx*TILE,ry+ty*TILE,TILE,TILE);
    }
    // walls
    ctx.fillStyle=th.wall;
    ctx.fillRect(rx,ry,r.w,TILE);
    ctx.fillRect(rx,ry+r.h-TILE,r.w,TILE);
    ctx.fillRect(rx,ry,TILE,r.h);
    ctx.fillRect(rx+r.w-TILE,ry,TILE,r.h);
    ctx.fillStyle=th.wallTop;
    ctx.fillRect(rx,ry,r.w,TILE*.4);
    // door gaps (visual) + locked bars
    const dw=TILE*3;
    function door(dx,dy,w,h,vert){
      ctx.fillStyle=th.floor;
      ctx.fillRect(dx,dy,w,h);
      if(r.locked){
        ctx.fillStyle='rgba(232,130,26,0.85)';
        if(vert){for(let i=0;i<3;i++)ctx.fillRect(dx+4+i*(w-8)/2.4,dy,3,h);}
        else{for(let i=0;i<3;i++)ctx.fillRect(dx,dy+4+i*(h-8)/2.4,w,3);}
      }
    }
    if(r.doors.r)door(rx+r.w-TILE,ry+r.h/2-dw/2,TILE,dw,false);
    if(r.doors.l)door(rx,ry+r.h/2-dw/2,TILE,dw,false);
    if(r.doors.d)door(rx+r.w/2-dw/2,ry+r.h-TILE,dw,TILE,true);
    if(r.doors.u)door(rx+r.w/2-dw/2,ry,dw,TILE,true);
    // boss room marker
    if(r.type==='boss'&&!r.visited){
      ctx.fillStyle='rgba(255,69,58,0.6)';
      ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText('💀',rx+r.w/2,ry+r.h/2);
      ctx.textAlign='left';
    }
  }
  // Corridors
  for(const c of corridorRects){
    const cx2=px(c.x-cam.x),cy2=px(c.y-cam.y);
    ctx.fillStyle=th.floor;
    ctx.fillRect(cx2,cy2,c.w,c.h);
    ctx.fillStyle=th.wall;
    if(c.w>c.h){ // horizontal
      ctx.fillRect(cx2,cy2-TILE*.5,c.w,TILE*.5);
      ctx.fillRect(cx2,cy2+c.h,c.w,TILE*.5);
    }else{
      ctx.fillRect(cx2-TILE*.5,cy2,TILE*.5,c.h);
      ctx.fillRect(cx2+c.w,cy2,TILE*.5,c.h);
    }
  }
}

function drawFX(){
  for(const p of parts){
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.col;
    ctx.fillRect(px(p.x-cam.x)-p.sz/2,px(p.y-cam.y)-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha=1;
  for(const d of dmgNums){
    ctx.globalAlpha=Math.min(1,d.t*2.5);
    ctx.font=(d.crit?'800 15px':'700 11px')+' -apple-system,sans-serif';
    ctx.fillStyle=d.crit?'#FFD60A':'#fff';
    ctx.textAlign='center';
    ctx.fillText(d.v,px(d.x-cam.x),px(d.y-cam.y));
  }
  ctx.textAlign='left';ctx.globalAlpha=1;
  for(const r of rings){
    ctx.globalAlpha=r.t*2;
    ctx.strokeStyle=r.col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(px(r.x-cam.x),px(r.y-cam.y),r.r,0,TAU);ctx.stroke();
  }
  ctx.globalAlpha=1;
  // melee swings
  for(const ms of [meleeSwing,meleeSwing2]){
    if(ms&&ms.t>0){
      ctx.globalAlpha=ms.t/.14;
      ctx.strokeStyle='#fff';ctx.lineWidth=3;
      ctx.beginPath();
      ctx.arc(px(P.x-cam.x),px(P.y-cam.y),ms.range*.85,ms.ang-.7,ms.ang+.7);
      ctx.stroke();
      ms.t-=1/60;
      ctx.globalAlpha=1;
    }
  }
  if(muzzle&&muzzle.t>0){
    ctx.fillStyle='#FFD60A';
    ctx.beginPath();ctx.arc(px(muzzle.x-cam.x),px(muzzle.y-cam.y),5,0,TAU);ctx.fill();
    muzzle.t-=1/60;
  }
}

// boss HP bar at top of screen
function drawBossBar(){
  const room=roomAt(P.x,P.y);
  if(!boss||boss.dead||!room||room.type!=='boss'||!room.visited)return;
  const bw=Math.min(420,VW*.55),bx=(VW-bw)/2,by=44;
  ctx.fillStyle='rgba(10,10,16,0.7)';
  roundRect(bx-12,by-20,bw+24,40,12);ctx.fill();
  ctx.font='700 11px -apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.textAlign='center';
  ctx.fillText(boss.name+'  ·  PHASE '+boss.phase,VW/2,by-5);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  roundRect(bx,by+2,bw,7,4);ctx.fill();
  const pc=boss.hp/boss.maxHp;
  const grd=ctx.createLinearGradient(bx,0,bx+bw,0);
  grd.addColorStop(0,boss.phase===3?'#FF453A':boss.col);
  grd.addColorStop(1,'#FF6B9D');
  ctx.fillStyle=grd;
  roundRect(bx,by+2,Math.max(4,bw*pc),7,4);ctx.fill();
  ctx.textAlign='left';
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

// ── HUD DOM updates ──────────────────────────────
function pipRow(el,cur,max,onCls,offCls){
  let h='';
  for(let i=0;i<max;i++)h+='<div class="pip '+(i<cur?onCls:offCls)+'"></div>';
  el.innerHTML=h;
}
let hudT=0;
function updateHUD(dt){
  hudT+=dt; if(hudT<.08)return; hudT=0;
  pipRow(document.getElementById('hpPips'),P.hp,P.maxHp,'hp-on','hp-off');
  pipRow(document.getElementById('arPips'),P.armor,P.maxArmor,'ar-on','ar-off');
  document.getElementById('mpBar').style.width=(P.en/P.maxEn*100)+'%';
  document.getElementById('mpNum').textContent=Math.round(P.en);
  // skill button
  const sb=document.getElementById('skillBtn');
  if(P.skillT>0){sb.className='cd';sb.querySelector('.lbl').textContent=P.skillT.toFixed(0)+'s';}
  else if(P.skillCd>0){sb.className='cd';sb.querySelector('.lbl').textContent=Math.ceil(P.skillCd)+'s';}
  else{sb.className='ready';sb.querySelector('.lbl').textContent='火力全開';}
  drawMinimap();
}
function updateWpnCard(){
  const w=P.wpn;
  document.getElementById('wpnIcon').textContent=w.ico;
  document.getElementById('wpnName').textContent=w.n;
  document.getElementById('wpnSub').textContent=
    w.type==='melee'?('傷害 '+w.dmg+' · 近戰 · 免能量'):('傷害 '+w.dmg+' · 能量 '+w.en);
}
document.getElementById('skillBtn').addEventListener('click',useSkill);
document.getElementById('skillBtn').addEventListener('touchstart',e=>{e.preventDefault();useSkill();},{passive:false});

// minimap: room layout in glass card
const mmc=document.getElementById('mmc'),mmx=mmc.getContext('2d');
function drawMinimap(){
  mmx.clearRect(0,0,120,90);
  const cw=20,ch=14,gx=2,gy=2;
  for(const r of rooms){
    if(!r.visited&&r.type!=='boss')continue;
    const x=6+r.cx*(cw+gx),y=4+r.cy*(ch+gy);
    const cur=roomAt(P.x,P.y)===r;
    mmx.fillStyle=cur?'#E8821A':
      r.type==='boss'?(r.cleared?'rgba(52,199,89,0.7)':'rgba(255,69,58,0.65)'):
      r.cleared?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.14)';
    mmx.beginPath();
    mmx.roundRect(x,y,cw,ch,3.5);
    mmx.fill();
    if(r.type==='weapon'&&r.visited){
      mmx.fillStyle='#FFD60A';mmx.font='8px sans-serif';
      mmx.fillText('⚔',x+cw/2-4,y+ch/2+3);
    }
  }
}

// ── Toast ──────────────────────────────
let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),1800);
}

// ── Buffs (Soul Knight blessing picks) ──────────────────────────────
const BUFFS=[
  {ico:'❤️', n:'生命強化', d:'最大生命 +2，並完全回復', fn:()=>{P.maxHp+=2;P.hp=P.maxHp;}},
  {ico:'🛡', n:'護甲強化', d:'最大護甲 +2', fn:()=>{P.maxArmor+=2;P.armor=P.maxArmor;}},
  {ico:'⚡', n:'能量擴充', d:'最大能量 +80', fn:()=>{P.maxEn+=80;P.en=P.maxEn;}},
  {ico:'🗡', n:'傷害提升', d:'所有傷害 +30%', fn:()=>{P.dmgMul*=1.3;}},
  {ico:'👟', n:'疾風步伐', d:'移動速度 +18%', fn:()=>{P.spdMul*=1.18;}},
  {ico:'🎯', n:'暴擊專精', d:'暴擊率 +15%', fn:()=>{P.crit+=.15;}},
  {ico:'🔋', n:'即刻充能', d:'立即回滿能量與護甲', fn:()=>{P.en=P.maxEn;P.armor=P.maxArmor;}},
];
function showBuffs(){
  const ov=document.getElementById('buffOv');
  const wrap=document.getElementById('buffCards');
  wrap.innerHTML='';
  const picks=[...BUFFS].sort(()=>Math.random()-.5).slice(0,3);
  picks.forEach(b=>{
    const c=document.createElement('div');
    c.className='buff-card';
    c.innerHTML='<div class="b-ico">'+b.ico+'</div><div class="b-name">'+b.n+'</div><div class="b-desc">'+b.d+'</div>';
    c.onclick=()=>{
      b.fn(); SFX.buff(); ov.classList.remove('on');
      nextFloor();
    };
    wrap.appendChild(c);
  });
  ov.classList.add('on');
}

// ── Floor flow ──────────────────────────────
let floorIdx=0, score=0, state='menu';
const FLOOR_LABELS=['1-1','2-1','3-1'];

function startFloor(){
  genFloor(floorIdx);
  corridorRects=corridors();
  boss=null;
  bullets.length=0;orbs.length=0;parts.length=0;dmgNums.length=0;rings.length=0;
  const start=rooms[0];
  P.x=start.x+start.w/2; P.y=start.y+start.h/2;
  cam.x=P.x-VW/2; cam.y=P.y-VH/2;
  document.getElementById('floorNum').textContent=FLOOR_LABELS[floorIdx]||(floorIdx+1);
  document.getElementById('floorName').textContent=THEMES[floorIdx].name;
  toast('🏰 '+THEMES[floorIdx].name);
}
function floorClear(){
  if(floorIdx>=2){endGame(true);return;}
  showBuffs();
}
function nextFloor(){
  floorIdx++;
  startFloor();
}
function endGame(win){
  state='over';
  const ov=document.getElementById('overOv');
  document.getElementById('ovEyebrow').textContent=win?'Victory':'Game Over';
  document.getElementById('ovEyebrow').style.color=win?'#34C759':'#FF453A';
  document.getElementById('ovTitle').textContent=win?'奪回魔法石！':'騎士倒下了';
  document.getElementById('ovDesc').textContent=win
    ?('三層地牢全部攻克 · 最終分數 '+score)
    :('止步於 '+THEMES[floorIdx].name+' · 分數 '+score);
  ov.classList.add('on');
}

function startGame(){
  document.getElementById('splash').classList.remove('on');
  document.getElementById('overOv').classList.remove('on');
  resetPlayer();
  floorIdx=0;score=0;state='play';
  updateWpnCard();
  startFloor();
  if(ac()&&AC.state==='suspended')AC.resume();
}
document.getElementById('startBtn').onclick=startGame;
document.getElementById('againBtn').onclick=startGame;
document.getElementById('quitBtn').onclick=()=>{
  // tell parent (Fabrica) to close the game overlay
  try{window.parent.postMessage({type:'fabrica-game-close'},'*');}catch(e){}
};

// ── Hero preview on splash ──────────────────────────────
(function heroPrev(){
  const c=document.getElementById('heroPrev'),x=c.getContext('2d');
  x.imageSmoothingEnabled=false;
  // mini chibi knight 40x40
  x.fillStyle='#3A3A45';x.fillRect(14,30,5,6);x.fillRect(21,30,5,6);
  x.fillStyle='#C5C9D6';x.fillRect(12,20,16,11);
  x.fillStyle='#FF4F2E';x.fillRect(10,18,20,5);x.fillRect(4,19,7,4);
  x.fillStyle='#F2D4B0';x.fillRect(10,4,20,16);
  x.fillStyle='#D4D8E4';x.fillRect(8,2,24,8);x.fillRect(8,2,4,15);x.fillRect(28,2,4,15);
  x.fillStyle='rgba(255,255,255,0.5)';x.fillRect(13,3,5,2.5);
  x.fillStyle='#22232B';x.fillRect(15,11,3.5,5);x.fillRect(23,11,3.5,5);
  x.fillStyle='#fff';x.fillRect(15.5,11.5,1.4,1.4);x.fillRect(23.5,11.5,1.4,1.4);

// ── Main loop ──────────────────────────────
let last=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(.033,(now-last)/1000);last=now;
  if(state!=='play')return;

  // ticks
  tickPlayer(dt);
  const curRoom=roomAt(P.x,P.y);
  if(curRoom){
    enterRoom(curRoom);
    for(const e of curRoom.enemies){
      if(e.isBoss)tickBoss(e,dt,curRoom);
      else tickEnemy(e,dt,curRoom);
    }
    checkRoomClear(curRoom);
  }
  tickBullets(dt);
  tickOrbs(dt);
  tickFX(dt);
  tickCam(dt);
  updateHUD(dt);

  // render
  const sx2=(Math.random()-.5)*shakeAmt*10,sy2=(Math.random()-.5)*shakeAmt*10;
  ctx.save();
  ctx.clearRect(0,0,VW,VH);
  ctx.fillStyle='#0c0c14';
  ctx.fillRect(0,0,VW,VH);
  ctx.translate(sx2,sy2);
  drawWorld();
  if(curRoom)drawDrops(curRoom);
  drawOrbs();
  // enemies in nearby rooms
  for(const r of rooms){
    if(Math.abs(r.x-cam.x)>VW*1.5||Math.abs(r.y-cam.y)>VH*1.5)continue;
    for(const e of r.enemies)drawEnemy(e);
  }
  drawBullets();
  drawKnight(px(P.x-cam.x),px(P.y-cam.y));
  drawFX();
  ctx.restore();
  drawBossBar();

  // vignette
  const vg=ctx.createRadialGradient(VW/2,VH/2,VH*.42,VW/2,VH/2,VH*.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,VW,VH);
}
requestAnimationFrame(loop);
</script>
